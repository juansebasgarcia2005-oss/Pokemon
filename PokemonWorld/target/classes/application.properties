# Configuración de la conexión a PostgreSQL en pgAdmin
spring.datasource.url=jdbc:postgresql://localhost:5432/pokemon
spring.datasource.username=postgres
spring.datasource.password=Hanna1007.
spring.datasource.driver-class-name=org.postgresql.Driver

# Configuración de JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
# 'update' permite que Spring Boot reconozca las tablas existentes sin borrarlas
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
